<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Away - Our Memory Book</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f2e9;
            --paper-color: #fdfbf7;
            --accent-brown: #8d775f;
            --soft-gold: #c5a059;
            --text-dark: #4a4238;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: none; /* Custom cursor used later */
        }

        /* Background Effects */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.3;
            pointer-events: none;
            z-index: 50;
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--soft-gold) 0%, transparent 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 15px var(--soft-gold);
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        /* Cover Page */
        #cover {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1516053303025-5d9f55fbb902?q=80&w=2000') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 1s ease;
            text-align: center;
            color: #fff;
        }

        #cover h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        #cover p {
            font-size: 1.5rem;
            font-style: italic;
            opacity: 0.9;
        }

        .instruction {
            margin-top: 50px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        /* Scrapbook Container */
        .scrapbook {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            position: relative;
            perspective: 2000px;
            display: none; /* Initially hidden */
            z-index: 10;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper-color);
            padding: 40px;
            box-shadow: 10px 10px 30px var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            transform-origin: left;
            backface-visibility: hidden;
            overflow: hidden;
        }

        .page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.05) 0%, transparent 5%);
        }

        .page.active {
            transform: rotateY(0deg);
            z-index: 2;
            opacity: 1;
        }

        .page.flipped {
            transform: rotateY(-180deg);
            z-index: 1;
            opacity: 0;
        }

        /* Content Styles */
        .polaroid {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            animation: dangle 3s ease-in-out infinite;
            margin-bottom: 30px;
            position: relative;
        }

        .polaroid img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            filter: sepia(0.2) contrast(0.9);
        }

        .tape {
            position: absolute;
            top: -15px;
            width: 100px;
            height: 30px;
            background: rgba(220, 200, 150, 0.5);
            transform: rotate(2deg);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
        }

        .lyrics {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--accent-brown);
            text-align: center;
            min-height: 2em;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 20px;
            z-index: 60;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-brown);
            padding: 10px 20px;
            color: var(--accent-brown);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
        }

        .btn:hover {
            background: var(--accent-brown);
            color: #fff;
        }

        .music-control {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 60;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @keyframes dangle {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        /* Typist effect class */
        .typing::after {
            content: '|';
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            #cover h1 { font-size: 3rem; }
            .polaroid img { width: 180px; height: 180px; }
            .lyrics { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="grain-overlay"></div>
    <div class="particles" id="particles"></div>

    <!-- Background Music -->
    <audio id="bgm" loop>
        <source src="slide-away.mp3" type="audio/mpeg">
        <!-- Alternatif URL jika file tidak ada -->
    </audio>

    <div class="music-control">
        <button class="btn" onclick="toggleMusic()" style="font-size: 12px;">Music: On/Off</button>
    </div>

    <!-- COVER SECTION -->
    <div id="cover" onclick="openBook()">
        <h1>Slide Away</h1>
        <p>A little memory book for us.</p>
        <div class="instruction">Tap anywhere to open the memories</div>
    </div>

    <!-- SCRAPBOOK SECTION -->
    <div class="scrapbook" id="scrapbook">
        <!-- Pages will be generated here -->
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button class="btn" onclick="prevPage()">Prev</button>
        <button class="btn" onclick="nextPage()">Next</button>
    </div>

    <script>
        const lyrics = [
            "Slide in baby, together we’ll fly",
            "I’ve tried praying but I don’t know what you’re saying to me",
            "Now that you’re mine, we’ll find a way",
            "Of chasing the sun",
            "Let me be the one who shines with you",
            "In the morning we don’t know what to do",
            "Two of a kind, we’ll find a way",
            "To do what we’ve done",
            "Let me be the one who shines with you",
            "And we can slide away..."
        ];

        // Ganti URL foto di sini dengan foto kamu
        const images = [
            "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=500",
            "https://images.unsplash.com/photo-1523438885200-e635ba2c371e?q=80&w=500",
            "https://images.unsplash.com/photo-1516589174184-c68526514ec0?q=80&w=500",
            "https://images.unsplash.com/photo-1494774157365-9e04c6720e47?q=80&w=500",
            "https://images.unsplash.com/photo-1474552226712-ac0f0961a954?q=80&w=500",
            "https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=500",
            "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=500",
            "https://images.unsplash.com/photo-1516575334481-f85287c2c82d?q=80&w=500",
            "https://images.unsplash.com/photo-1464746109380-40181ce74a8e?q=80&w=500",
            "https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=500"
        ];

        let currentPage = 0;
        const totalPages = lyrics.length;
        const scrapbook = document.getElementById('scrapbook');
        const bgm = document.getElementById('bgm');

        // Initialize Cursor
        document.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Generate Pages
        function createPages() {
            lyrics.forEach((text, i) => {
                const page = document.createElement('div');
                page.className = `page ${i === 0 ? 'active' : ''}`;
                page.style.zIndex = totalPages - i;
                
                page.innerHTML = `
                    <div class="tape"></div>
                    <div class="polaroid">
                        <img src="${images[i]}" alt="Memories">
                    </div>
                    <div class="lyrics" id="lyric-${i}"></div>
                    ${i === totalPages - 1 ? '<p style="margin-top:20px; font-weight:bold;">Some memories never fade.</p>' : ''}
                `;
                scrapbook.appendChild(page);
            });
        }

        // Open Book Event
        function openBook() {
            document.getElementById('cover').style.transform = 'translateY(-100%)';
            document.getElementById('cover').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('cover').style.display = 'none';
                scrapbook.style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                typeLyrics(0);
            }, 1000);

            // Play Music
            bgm.play().catch(e => console.log("Music needs interaction first"));
            createParticles();
        }

        // Typing Effect
        function typeLyrics(index) {
            const element = document.getElementById(`lyric-${index}`);
            const text = lyrics[index];
            element.innerHTML = "";
            let i = 0;
            element.classList.add('typing');
            
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, 70);
                } else {
                    element.classList.remove('typing');
                }
            }
            typing();
        }

        // Navigation
        function nextPage() {
            if (currentPage < totalPages - 1) {
                const currentEl = document.getElementsByClassName('page')[currentPage];
                currentEl.classList.add('flipped');
                currentEl.classList.remove('active');
                
                currentPage++;
                const nextEl = document.getElementsByClassName('page')[currentPage];
                nextEl.classList.add('active');
                typeLyrics(currentPage);
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                const currentEl = document.getElementsByClassName('page')[currentPage];
                currentEl.classList.remove('active');
                
                currentPage--;
                const prevEl = document.getElementsByClassName('page')[currentPage];
                prevEl.classList.remove('flipped');
                prevEl.classList.add('active');
                typeLyrics(currentPage);
            }
        }

        // Music Control
        function toggleMusic() {
            if (bgm.paused) bgm.play();
            else bgm.pause();
        }

        // Floating particles (Light rain effect)
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.width = p.style.height = Math.random() * 5 + 2 + 'px';
                p.style.animationDuration = Math.random() * 3 + 2 + 's';
                p.style.delay = Math.random() * 5 + 's';
                p.style.opacity = Math.random();
                container.appendChild(p);
            }
        }

        window.onload = createPages;
    </script>
</body>
</html>
