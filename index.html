<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapbook For You ♡</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Indie+Flower&family=Quicksand:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-paper: #e8e4da;
            --note-red: #cc4444;
            --note-yellow: #f1c40f;
            --text-hand: 'Gochi Hand', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #333; /* Background gelap agar buku menonjol */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            flex-direction: column;
            position: relative;
        }

        /* Container Buku */
        .book-container {
            position: relative;
            width: 360px;
            height: 500px;
            perspective: 1500px;
        }

        /* Lembaran Halaman */
        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: var(--bg-paper);
            padding: 30px;
            border: 1px solid #c4c1b5;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            background-image: 
                linear-gradient(90deg, rgba(200,200,200,.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .back { transform: rotateY(180deg); }

        /* Gaya Bingkai Foto Polaroid */
        .photo-frame {
            background: white;
            padding: 10px 10px 35px 10px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            width: 85%;
            margin: 10px auto;
            transform: rotate(-2deg);
        }

        .photo-frame img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        /* Catatan Tempel (Sticky Notes) */
        .sticky-note {
            background-color: var(--note-red);
            color: white;
            padding: 10px;
            font-family: var(--text-hand);
            font-size: 24px;
            width: fit-content;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transform: rotate(2deg);
        }

        /* Tulisan Tangan */
        .handwritten {
            font-family: var(--text-hand);
            font-size: 32px;
            color: #333;
            margin-top: 15px;
            line-height: 1.2;
        }

        /* Dekorasi Tambahan */
        .cover-page {
            background-color: #b33939;
            color: white;
            justify-content: center;
            text-align: center;
            border: 5px solid #8c2a2a;
        }

        .hint {
            position: fixed;
            bottom: 20px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 99;
        }

        /* Animasi Halaman */
        .flipped { transform: rotateY(-180deg) !important; z-index: 10 !important; }

        /* Status Musik Melayang */
        .music-status {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <audio id="audio-player" loop>
        <source src="slide-away.mp3" type="audio/mpeg">
    </audio>

    <div class="music-status" id="status-text">🎵 Tap layar untuk musik</div>

    <div class="book-container">
        <div class="page" style="z-index: 5;">
            <div class="front cover-page">
                <div style="font-size: 50px;">📖</div>
                <h1 style="font-family: 'Indie Flower';">Scrapbook Kita</h1>
                <p style="margin-top: 10px;">Sentuh untuk membuka ✨</p>
            </div>
            <div class="back">
                <div class="sticky-note">I Said...</div>
                <div class="handwritten">Maybe...</div>
                <div class="photo-frame">
                    <img src="https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?w=400" alt="Foto1">
                </div>
            </div>
        </div>

        <div class="page" style="z-index: 4;">
            <div class="front">
                <div class="handwritten">You're gonna be the one...</div>
                <div class="photo-frame" style="transform: rotate(3deg); background: #fff;">
                    <img src="https://images.unsplash.com/photo-1522673607200-1648832cee98?w=400" alt="Foto2">
                </div>
                <div class="sticky-note" style="background: var(--note-yellow); color: black; margin-left: auto;">That Saves Me!</div>
            </div>
            <div class="back">
                <div class="handwritten">And After All...</div>
                <div class="photo-frame">
                    <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=400" alt="Foto3">
                </div>
            </div>
        </div>

        <div class="page" style="z-index: 3;">
            <div class="front">
                <div class="sticky-note">Slide Away 🎶</div>
                <div class="handwritten">You're My Wonderwall & Everything.</div>
                <div class="photo-frame" style="transform: scale(1.1) rotate(0deg);">
                    <img src="https://images.unsplash.com/photo-1474552226712-ac0f0961a954?w=400" alt="Foto4">
                </div>
            </div>
            <div class="back cover-page">
                <h2>I Love You! ❤️</h2>
                <p>Klik lagi untuk menutup</p>
            </div>
        </div>
    </div>

    <div class="hint">Sentuh buku untuk membalik halaman</div>

    <script>
        const pages = document.querySelectorAll('.page');
        const audio = document.getElementById('audio-player');
        const statusText = document.getElementById('status-text');
        let musicStarted = false;

        // Fungsi memutar musik pada interaksi pertama pengguna
        document.body.addEventListener('click', () => {
            if (!musicStarted) {
                audio.play()
                    .then(() => {
                        musicStarted = true;
                        statusText.innerText = "🔊 Now Playing: Slide Away 🎶";
                    })
                    .catch((error) => {
                        console.log("Audio play blocked/failed:", error);
                        statusText.innerText = "⚠️ Klik sekali lagi untuk memutar musik";
                    });
            }
        });

        // Efek Membalik Halaman
        pages.forEach((page, index) => {
            page.addEventListener('click', () => {
                if (page.classList.contains('flipped')) {
                    page.classList.remove('flipped');
                    setTimeout(() => {
                        page.style.zIndex = 5 - index;
                    }, 500);
                } else {
                    page.classList.add('flipped');
                    page.style.zIndex = 10 + index;
                }
            });
        });
    </script>
</body>
</html>
