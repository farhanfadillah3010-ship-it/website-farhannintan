<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slide Away — Oasis Memory Book</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;500;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
    --paper:#f8f2e8;
    --gold:#d7b46a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:
    radial-gradient(circle at top,
    #2d221d,
    #0a0a0a 70%);
    height:100vh;
    font-family:'Cormorant Garamond', serif;
}

/* =========================
AMBIENT
========================= */

body::before{
    content:'';
    position:fixed;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 30%,
    rgba(255,210,150,.15),
    transparent 25%),

    radial-gradient(circle at 80% 60%,
    rgba(120,170,255,.10),
    transparent 30%);

    filter:blur(80px);

    animation:aurora 18s ease-in-out infinite alternate;

    z-index:-1;
}

@keyframes aurora{
    100%{
        transform:translate(5%,5%) scale(1.1);
    }
}

/* =========================
BOOK
========================= */

.book-wrap{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    perspective:3000px;
}

.book{
    position:relative;

    width:min(92vw,1000px);
    height:min(86vh,720px);

    transform-style:preserve-3d;
}

.page{
    position:absolute;

    width:50%;
    height:100%;

    top:0;
    left:50%;

    transform-origin:left center;

    transition:
    transform 1.6s cubic-bezier(.22,.61,.36,1),
    box-shadow 1s;

    transform-style:preserve-3d;

    cursor:pointer;
}

/* =========================
PAGE FRONT/BACK
========================= */

.front,
.back{
    position:absolute;
    inset:0;

    backface-visibility:hidden;

    background:
    linear-gradient(rgba(255,255,255,.12),rgba(255,255,255,.12)),
    var(--paper);

    overflow:hidden;

    border-radius:0 12px 12px 0;

    box-shadow:
    inset 0 0 40px rgba(255,255,255,.5),
    0 20px 50px rgba(0,0,0,.35);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    padding:40px;
}

.back{
    transform:rotateY(180deg);
}

/* =========================
PAGE FLIP
========================= */

.page.flipped{
    transform:rotateY(-180deg);
}

.page.flipped .front{
    pointer-events:none;
}

/* =========================
BOOK SHADOW
========================= */

.book::before{
    content:'';

    position:absolute;

    width:50%;
    height:100%;

    left:0;

    background:#e8dcc8;

    border-radius:12px 0 0 12px;

    box-shadow:
    inset 0 0 50px rgba(0,0,0,.15),
    0 20px 60px rgba(0,0,0,.4);
}

.book::after{
    content:'';

    position:absolute;

    width:40px;
    height:100%;

    left:50%;
    transform:translateX(-50%);

    background:
    linear-gradient(to right,
    rgba(0,0,0,.25),
    rgba(255,255,255,.08),
    rgba(0,0,0,.25));

    z-index:100;
}

/* =========================
PHOTO
========================= */

.polaroid{
    background:white;

    padding:14px 14px 55px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.25);

    transform:rotate(-3deg);

    transition:1s;
}

.page:hover .polaroid{
    transform:
    rotate(0deg)
    scale(1.03)
    translateY(-5px);
}

.polaroid img{
    width:280px;
    height:340px;

    object-fit:cover;

    display:block;

    transition:8s ease;
}

.page:hover .polaroid img{
    transform:scale(1.08);
}

.tape{
    position:absolute;

    width:110px;
    height:30px;

    background:rgba(255,220,150,.45);

    top:-12px;
    left:50%;

    transform:translateX(-50%) rotate(2deg);
}

/* =========================
TEXT
========================= */

.quote{
    margin-top:28px;

    text-align:center;

    font-family:'Dancing Script', cursive;

    font-size:clamp(1.8rem,3vw,3rem);

    color:#5f4638;

    line-height:1.5;

    text-shadow:
    0 0 12px rgba(255,255,255,.5);

    animation:fadeUp 1.4s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
        filter:blur(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
        filter:blur(0);
    }
}

/* =========================
TITLE
========================= */

.cover-title{
    font-family:'Playfair Display', serif;

    font-size:5rem;

    color:#4c372c;

    font-style:italic;

    text-shadow:
    0 0 20px rgba(255,255,255,.5),
    0 0 50px rgba(215,180,106,.4);
}

.cover-sub{
    margin-top:10px;

    font-size:1.4rem;

    color:#7b5e4d;
}

/* =========================
INSTRUCTION
========================= */

.hint{
    position:fixed;

    bottom:25px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    font-family:'Playfair Display', serif;

    letter-spacing:3px;

    opacity:.7;

    animation:blink 2s infinite;
}

@keyframes blink{
    50%{
        opacity:.25;
    }
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

.book{
    width:95vw;
    height:78vh;
}

.polaroid img{
    width:180px;
    height:240px;
}

.cover-title{
    font-size:3rem;
}

.quote{
    font-size:1.5rem;
}

}

</style>
</head>

<body>

<div class="book-wrap">

<div class="book" id="book">

    <!-- COVER -->

    <div class="page" style="z-index:6">

        <div class="front">

            <div class="cover-title">
                Slide Away
            </div>

            <div class="cover-sub">
                A little memory book for us
            </div>

        </div>

        <div class="back">

            <div class="polaroid">
                <div class="tape"></div>

                <img src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963?q=80&w=1200&auto=format&fit=crop">
            </div>

            <div class="quote">
                “Slide in baby, together we’ll fly”
            </div>

        </div>

    </div>

    <!-- PAGE 2 -->

    <div class="page" style="z-index:5">

        <div class="front">

            <div class="polaroid">
                <div class="tape"></div>

                <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1200&auto=format&fit=crop">
            </div>

            <div class="quote">
                “I’ve tried praying but I don’t know what you’re saying to me”
            </div>

        </div>

        <div class="back">

            <div class="polaroid">
                <div class="tape"></div>

                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop">
            </div>

            <div class="quote">
                “Let me be the one who shines with you”
            </div>

        </div>

    </div>

    <!-- PAGE 3 -->

    <div class="page" style="z-index:4">

        <div class="front">

            <div class="polaroid">
                <div class="tape"></div>

                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1200&auto=format&fit=crop">
            </div>

            <div class="quote">
                “And we can slide away...”
            </div>

        </div>

        <div class="back">

            <div style="
                text-align:center;
                font-family:'Playfair Display',serif;
                color:#5f4638;
            ">

                <h1 style="
                    font-size:3rem;
                    margin-bottom:20px;
                ">
                    Some memories never fade.
                </h1>

                <p style="
                    font-size:1.3rem;
                    opacity:.7;
                ">
                    The End
                </p>

            </div>

        </div>

    </div>

</div>

</div>

<div class="hint">
    CLICK PAGE TO FLIP →
</div>

<script>

const pages = document.querySelectorAll(".page");

pages.forEach((page,index)=>{

    page.addEventListener("click",()=>{

        if(!page.classList.contains("flipped")){

            page.classList.add("flipped");

            page.style.zIndex = index;

        }else{

            page.classList.remove("flipped");

            page.style.zIndex = pages.length - index;

        }

    });

});

/* swipe mobile */

let startX = 0;

document.addEventListener("touchstart",(e)=>{

    startX = e.touches[0].clientX;

});

document.addEventListener("touchend",(e)=>{

    let endX = e.changedTouches[0].clientX;

    let diff = startX - endX;

    if(Math.abs(diff) > 50){

        if(diff > 0){

            for(let i=0;i<pages.length;i++){

                if(!pages[i].classList.contains("flipped")){

                    pages[i].classList.add("flipped");

                    break;
                }
            }

        }else{

            for(let i=pages.length-1;i>=0;i--){

                if(pages[i].classList.contains("flipped")){

                    pages[i].classList.remove("flipped");

                    break;
                }
            }

        }

    }

});

</script>

</body>
</html>
