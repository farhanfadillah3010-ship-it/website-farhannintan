<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Slide Away — Oasis Dream Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;500;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
    --cream:#f8f2e8;
    --gold:#d7b46a;
    --gold-soft:rgba(215,180,106,.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    cursor:none;
}

body{
    overflow:hidden;
    background:#090909;
    font-family:'Cormorant Garamond', serif;
    color:white;
}

/* =========================
BACKGROUND
========================= */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-20;
}

.bg::before{
    content:'';
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top left,
    rgba(255,220,160,.18),
    transparent 30%),

    radial-gradient(circle at bottom right,
    rgba(255,180,100,.12),
    transparent 35%),

    linear-gradient(120deg,#0a0a0a,#17120f,#1d1813);
}

.grain{
    position:absolute;
    inset:0;
    background:url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Noise_Texture.png');
    opacity:.06;
    mix-blend-mode:soft-light;
    animation:grain 8s steps(10) infinite;
}

@keyframes grain{
    0%{transform:translate(0,0);}
    20%{transform:translate(-3%,2%);}
    40%{transform:translate(3%,4%);}
    60%{transform:translate(2%,-2%);}
    80%{transform:translate(-2%,3%);}
    100%{transform:translate(0,0);}
}

/* =========================
OASIS DREAM FX
========================= */

body::before{
    content:'';
    position:fixed;
    inset:-20%;

    background:
    radial-gradient(circle at 20% 30%,
    rgba(255,220,170,.12),
    transparent 25%),

    radial-gradient(circle at 80% 60%,
    rgba(120,170,255,.10),
    transparent 28%),

    radial-gradient(circle at 50% 80%,
    rgba(255,180,120,.10),
    transparent 35%);

    animation:auroraMove 18s ease-in-out infinite alternate;
    filter:blur(80px);
    z-index:-30;
}

@keyframes auroraMove{
    0%{
        transform:translate(-5%,-3%) scale(1);
    }

    100%{
        transform:translate(5%,4%) scale(1.15);
    }
}

body::after{
    content:'';
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle,
    transparent 40%,
    rgba(0,0,0,.65) 100%);

    z-index:-10;
    pointer-events:none;
}

.blur-orb{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    mix-blend-mode:screen;
    opacity:.35;
    animation:orbFloat 16s ease-in-out infinite alternate;
}

.blur-orb.one{
    width:320px;
    height:320px;
    background:#ffc46b;
    top:10%;
    left:5%;
}

.blur-orb.two{
    width:280px;
    height:280px;
    background:#6ea8ff;
    bottom:5%;
    right:8%;
    animation-duration:20s;
}

@keyframes orbFloat{
    100%{
        transform:translateY(-40px) translateX(25px);
    }
}

.lights{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.light{
    position:absolute;
    width:400px;
    height:120vh;

    background:linear-gradient(to bottom,
    rgba(255,210,150,.2),
    transparent);

    filter:blur(60px);

    transform:rotate(20deg);

    animation:lightMove 12s ease-in-out infinite alternate;
}

.light:nth-child(2){
    left:70%;
    animation-duration:18s;
}

@keyframes lightMove{
    from{
        transform:translateY(-5%) rotate(15deg);
    }

    to{
        transform:translateY(10%) rotate(-10deg);
    }
}

/* =========================
PARTICLES
========================= */

.particles{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:rgba(255,230,180,.8);
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
    }
}

/* =========================
CURSOR
========================= */

#cursor{
    width:18px;
    height:18px;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    z-index:9999;
    background:white;

    mix-blend-mode:difference;

    box-shadow:
    0 0 10px white,
    0 0 30px var(--gold);

    transform:translate(-50%,-50%);
}

.trail{
    position:fixed;
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(255,220,170,.7);
    pointer-events:none;
    z-index:9998;
    animation:trailFade .8s linear forwards;
}

@keyframes trailFade{
    to{
        transform:scale(0);
        opacity:0;
    }
}

/* =========================
COVER
========================= */

#cover{
    position:fixed;
    inset:0;
    z-index:100;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    overflow:hidden;

    background:
    radial-gradient(circle,
    rgba(255,245,225,.95),
    rgba(225,210,190,.98));

    transition:2s cubic-bezier(.7,0,.3,1);
}

#cover.open{
    opacity:0;
    transform:scale(1.15);
    pointer-events:none;
}

.cover-content h1{
    font-family:'Playfair Display', serif;
    font-size:clamp(4rem,10vw,8rem);
    color:#3f2d22;
    font-style:italic;

    text-shadow:
    0 0 10px rgba(255,255,255,.5),
    0 0 40px rgba(215,180,106,.5);

    animation:shimmer 5s infinite;
}

@keyframes shimmer{
    50%{
        text-shadow:
        0 0 20px rgba(255,255,255,.7),
        0 0 60px rgba(215,180,106,.8);
    }
}

.subtitle{
    margin-top:10px;
    font-family:'Dancing Script', cursive;
    color:#6b5246;
    font-size:1.6rem;
}

.tap{
    margin-top:35px;
    letter-spacing:5px;
    font-size:.8rem;
    text-transform:uppercase;
    color:#8c7364;
    animation:breathe 2s infinite;
}

@keyframes breathe{
    50%{
        opacity:.3;
        transform:translateY(3px);
    }
}

/* =========================
BOOK
========================= */

#book{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    perspective:3000px;

    animation:bookBreath 12s ease-in-out infinite;
}

@keyframes bookBreath{
    50%{
        transform:scale(1.01);
    }
}

.page{
    position:absolute;

    width:min(90vw,950px);
    height:min(86vh,720px);

    background:
    linear-gradient(rgba(255,255,255,.1),rgba(255,255,255,.1)),
    var(--cream);

    border-radius:8px;

    padding:50px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    opacity:0;

    transform:
    rotateY(-90deg)
    translateY(30px)
    scale(.92);

    transition:1.5s cubic-bezier(.2,.8,.2,1);

    box-shadow:
    0 25px 70px rgba(0,0,0,.45);

    overflow:hidden;

    backdrop-filter:blur(2px);
}

.page.active{
    opacity:1;

    transform:
    rotateY(0)
    translateY(0)
    scale(1);

    animation:
    pageEnter 1.6s cubic-bezier(.2,.8,.2,1),
    pagePulse 8s ease-in-out infinite;
}

@keyframes pageEnter{
    from{
        opacity:0;
        transform:
        rotateY(-60deg)
        scale(.8)
        translateY(60px);

        filter:blur(10px);
    }

    to{
        opacity:1;
        transform:
        rotateY(0)
        scale(1)
        translateY(0);

        filter:blur(0);
    }
}

@keyframes pagePulse{
    50%{
        box-shadow:
        0 25px 80px rgba(0,0,0,.55),
        0 0 40px rgba(255,210,140,.18);
    }
}

/* =========================
PHOTO
========================= */

.polaroid{
    background:white;
    padding:15px 15px 60px;

    position:relative;

    transform:rotate(-3deg);

    transition:
    transform .8s ease,
    box-shadow .8s ease;

    box-shadow:
    0 20px 30px rgba(0,0,0,.2);
}

.polaroid:hover{
    transform:
    rotate(0deg)
    scale(1.04)
    translateY(-8px);

    box-shadow:
    0 30px 60px rgba(0,0,0,.35),
    0 0 40px rgba(255,220,170,.2);
}

.polaroid img{
    width:320px;
    height:380px;
    object-fit:cover;
    display:block;

    transition:
    transform 8s ease,
    filter 2s ease;
}

.page.active .polaroid img{
    transform:scale(1.08);
}

.polaroid:hover img{
    transform:scale(1.14);
}

.tape{
    position:absolute;
    top:-15px;
    left:50%;

    transform:translateX(-50%) rotate(2deg);

    width:120px;
    height:35px;

    background:rgba(255,225,170,.45);
}

/* =========================
TEXT
========================= */

.note{
    margin-top:30px;
    text-align:center;
}

.typing{
    font-family:'Dancing Script', cursive;

    font-size:clamp(1.8rem,3vw,3.2rem);

    color:#5c4337;

    line-height:1.6;

    position:relative;

    animation:fadeLyrics 1.5s ease;
}

.typing::after{
    content:'';
    position:absolute;
    inset:0;

    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.4),
    transparent);

    transform:translateX(-120%);
    animation:lyricsShine 5s infinite;
}

@keyframes lyricsShine{
    100%{
        transform:translateX(120%);
    }
}

@keyframes fadeLyrics{
    from{
        opacity:0;
        transform:translateY(20px);
        filter:blur(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
        filter:blur(0);
    }
}

/* =========================
BUTTONS
========================= */

.controls{
    position:fixed;
    bottom:25px;
    left:50%;

    transform:translateX(-50%);

    display:flex;
    gap:20px;

    opacity:0;
    transition:1s;

    z-index:100;

    animation:controlsFloat 5s ease-in-out infinite;
}

.controls.show{
    opacity:1;
}

@keyframes controlsFloat{
    50%{
        transform:
        translateX(-50%)
        translateY(-6px);
    }
}

button{
    border:none;
    padding:14px 28px;

    border-radius:40px;

    background:rgba(255,255,255,.08);

    color:white;

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    font-family:'Playfair Display', serif;

    letter-spacing:2px;

    transition:.4s;
}

button:hover{
    transform:translateY(-4px) scale(1.04);

    background:rgba(215,180,106,.2);

    box-shadow:
    0 0 20px rgba(215,180,106,.3);
}

.music{
    position:fixed;
    top:20px;
    right:20px;
    z-index:120;

    animation:musicPulse 3s infinite;
}

@keyframes musicPulse{
    50%{
        box-shadow:
        0 0 20px rgba(255,220,150,.4);
    }
}

/* =========================
ENDING
========================= */

#ending{
    position:fixed;
    inset:0;

    background:black;

    display:flex;
    align-items:center;
    justify-content:center;

    opacity:0;
    pointer-events:none;

    transition:3s;

    z-index:500;
}

#ending.show{
    opacity:1;
    pointer-events:auto;
}

#ending h1{
    font-family:'Playfair Display', serif;

    font-size:clamp(2rem,6vw,5rem);

    color:var(--gold);

    font-style:italic;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

.page{
    padding:25px;
}

.polaroid img{
    width:220px;
    height:280px;
}

.typing{
    font-size:1.6rem;
}

button{
    padding:12px 18px;
    font-size:.8rem;
}

}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="bg">

    <div class="grain"></div>

    <div class="blur-orb one"></div>
    <div class="blur-orb two"></div>

    <div class="lights">
        <div class="light"></div>
        <div class="light"></div>
    </div>

    <div class="particles" id="particles"></div>

</div>

<!-- CURSOR -->

<div id="cursor"></div>

<!-- AUDIO -->

<audio id="bgm" loop>
    <source src="slide-away.mp3" type="audio/mp3">
</audio>

<!-- COVER -->

<section id="cover" onclick="openBook()">

    <div class="cover-content">

        <p style="letter-spacing:8px;color:#8b6d5c;margin-bottom:15px;">
            MEMORIES
        </p>

        <h1>Slide Away</h1>

        <div class="subtitle">
            A little memory book for us.
        </div>

        <div class="tap">
            Tap anywhere to open
        </div>

    </div>

</section>

<!-- BOOK -->

<div id="book">

    <!-- PAGE 1 -->

    <div class="page active">

        <div class="polaroid">
            <div class="tape"></div>

            <img src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963?q=80&w=1200&auto=format&fit=crop">
        </div>

        <div class="note">
            <span class="typing">
                “Slide in baby, together we’ll fly”
            </span>
        </div>

    </div>

    <!-- PAGE 2 -->

    <div class="page">

        <div class="polaroid">
            <div class="tape"></div>

            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1200&auto=format&fit=crop">
        </div>

        <div class="note">
            <span class="typing">
                “I’ve tried praying but I don’t know what you’re saying to me”
            </span>
        </div>

    </div>

    <!-- PAGE 3 -->

    <div class="page">

        <div class="polaroid">
            <div class="tape"></div>

            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop">
        </div>

        <div class="note">
            <span class="typing">
                “Let me be the one who shines with you”
            </span>
        </div>

    </div>

    <!-- FINAL -->

    <div class="page">

        <div class="note">
            <span class="typing" style="font-size:4rem;">
                “And we can slide away...”
            </span>
        </div>

        <button onclick="showEnding()" style="margin-top:40px;">
            Close The Book
        </button>

    </div>

</div>

<!-- CONTROLS -->

<div class="controls" id="controls">

    <button onclick="prevPage()">
        Prev
    </button>

    <button onclick="nextPage()">
        Next
    </button>

</div>

<button class="music" onclick="toggleMusic()">
    Music
</button>

<!-- END -->

<div id="ending">

    <h1>
        Some memories never fade.
    </h1>

</div>

<script>

/* particles */

const particles = document.getElementById('particles');

for(let i=0;i<80;i++){

    let p = document.createElement('span');

    p.style.left = Math.random()*100 + 'vw';

    p.style.animationDuration =
    6 + Math.random()*10 + 's';

    p.style.animationDelay =
    Math.random()*5 + 's';

    p.style.opacity = Math.random();

    particles.appendChild(p);
}

/* cursor */

const cursor = document.getElementById('cursor');

document.addEventListener('mousemove',e=>{

    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';

    let trail = document.createElement('div');

    trail.className='trail';

    trail.style.left=e.clientX+'px';
    trail.style.top=e.clientY+'px';

    document.body.appendChild(trail);

    setTimeout(()=>trail.remove(),800);
});

/* pages */

const pages = document.querySelectorAll('.page');

let current = 0;

const bgm = document.getElementById('bgm');

function openBook(){

    document.getElementById('cover')
    .classList.add('open');

    document.getElementById('controls')
    .classList.add('show');

    bgm.volume=.8;

    bgm.play().catch(()=>{});
}

function showPage(index){

    pages.forEach((page)=>{

        page.classList.remove('active');

        page.style.zIndex = 1;
    });

    pages[index].style.zIndex = 5;

    pages[index].classList.add('active');

    pages[index].animate([

        {
            opacity:.2,
            transform:'scale(.92) rotateY(-15deg)',
            filter:'blur(8px)'
        },

        {
            opacity:1,
            transform:'scale(1) rotateY(0deg)',
            filter:'blur(0)'
        }

    ],{

        duration:1400,
        easing:'cubic-bezier(.2,.8,.2,1)'
    });
}

function nextPage(){

    if(current < pages.length-1){

        current++;

        showPage(current);
    }
}

function prevPage(){

    if(current > 0){

        current--;

        showPage(current);
    }
}

function toggleMusic(){

    if(bgm.paused){

        bgm.play();

    }else{

        bgm.pause();
    }
}

function showEnding(){

    document.getElementById('ending')
    .classList.add('show');

    let fade = setInterval(()=>{

        if(bgm.volume > .05){

            bgm.volume -= .05;

        }else{

            bgm.pause();

            clearInterval(fade);
        }

    },200);
}

/* keyboard support */

document.addEventListener('keydown',(e)=>{

    if(e.key === 'ArrowRight'){

        nextPage();
    }

    if(e.key === 'ArrowLeft'){

        prevPage();
    }
});

</script>

</body>
</html>
